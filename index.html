<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="وحش" />
<title>وحش</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #9a9a9a;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --green: #1D9E75;
    --green-light: #e1f5ee;
    --amber: #FAC775;
    --amber-dark: #633806;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --text: #f0f0f0;
      --text2: #a0a0a0;
      --text3: #6a6a6a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --green-light: #0a3326;
      --amber: #EF9F27;
      --amber-dark: #FAC775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .app { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
  .header { padding: 56px 20px 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 0.5px solid var(--border); }
  .header-title { font-size: 22px; font-weight: 600; }
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; padding: 10px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: var(--text3); cursor: pointer; border: none; background: none; }
  .tab i { font-size: 22px; }
  .tab.active { color: var(--green); }
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }
  .btn-primary { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  .btn-green { background: var(--green); color: white; border: none; border-radius: var(--radius-sm); padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-outline { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 14px; color: var(--text); cursor: pointer; }
  .btn-ghost { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; padding: 6px 10px; border-radius: var(--radius-sm); }
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; }
  .metric-val { font-size: 24px; font-weight: 600; }
  .metric-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  .ex-name { font-size: 15px; font-weight: 600; color: var(--green); }
  .ex-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .set-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .set-table th { color: var(--text2); font-weight: 500; text-align: center; padding: 6px 4px; font-size: 12px; }
  .set-table td { text-align: center; padding: 5px 4px; }
  .set-table input[type=number] { width: 64px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 6px; padding: 7px 4px; text-align: center; font-size: 14px; color: var(--text); -webkit-appearance: none; }
  .set-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg2); display: inline-flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text2); cursor: pointer; border: none; }
  .set-num.done { background: var(--green); color: white; }
  .timer { font-size: 32px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }
  .workout-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .history-date { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
  .history-title { font-size: 16px; font-weight: 600; }
  .history-meta { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .ex-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .ex-row:last-child { border-bottom: none; }
  .pr-badge { font-size: 10px; background: var(--amber); color: var(--amber-dark); padding: 3px 7px; border-radius: 10px; font-weight: 700; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-state i { font-size: 48px; display: block; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 15px; margin-bottom: 20px; }
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
  .ex-search { width: 100%; padding: 11px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 15px; background: var(--bg2); color: var(--text); margin-bottom: 12px; }
  .ex-option { padding: 13px 0; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .ex-option:active { opacity: 0.6; }
  /* Rest overlay */
  .rest-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 300; align-items: center; justify-content: center; }
  .rest-overlay.open { display: flex; }
  .rest-box { background: var(--bg); border-radius: 20px; padding: 32px 28px; text-align: center; min-width: 280px; }
  .rest-time { font-size: 64px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .rest-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .danger { color: #E24B4A; }
  .name-input { font-size: 19px; font-weight: 600; border: none; background: none; color: var(--text); width: 200px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title" id="page-title">Log</div>
  </div>

  <!-- LOG -->
  <div id="screen-log" class="screen active">
    <div id="no-workout">
      <div class="metric-grid">
        <div class="metric"><div class="metric-val" id="stat-workouts">0</div><div class="metric-lbl">Workouts</div></div>
        <div class="metric"><div class="metric-val" id="stat-volume">0</div><div class="metric-lbl">Avg vol (kg)</div></div>
        <div class="metric"><div class="metric-val" id="stat-streak">0</div><div class="metric-lbl">Streak</div></div>
      </div>
      <div class="empty-state">
        <i class="ti ti-barbell"></i>
        <p>No active workout</p>
        <button class="btn-primary" onclick="startWorkout()">Start workout</button>
      </div>
    </div>

    <div id="active-workout" style="display:none;">
      <div class="workout-header">
        <div>
          <input class="name-input" id="workout-name" value="Morning session" />
          <div class="timer" id="timer">0:00</div>
        </div>
        <button class="btn-green" onclick="finishWorkout()">Finish</button>
      </div>
      <div id="exercises-list"></div>
      <button class="btn-outline" style="width:100%; margin-top:8px;" onclick="openExModal()">
        <i class="ti ti-plus"></i> Add exercise
      </button>
      <button class="btn-ghost danger" style="width:100%; margin-top:10px;" onclick="cancelWorkout()">Cancel workout</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="screen-history" class="screen">
    <div id="history-list"></div>
  </div>

  <!-- STATS -->
  <div id="screen-stats" class="screen">
    <div class="metric-grid">
      <div class="metric"><div class="metric-val" id="s-total">0</div><div class="metric-lbl">Workouts</div></div>
      <div class="metric"><div class="metric-val" id="s-vol">0</div><div class="metric-lbl">Total vol (kg)</div></div>
      <div class="metric"><div class="metric-val" id="s-sets">0</div><div class="metric-lbl">Sets</div></div>
    </div>
    <div class="section-title">Personal records</div>
    <div id="pr-list"></div>
  </div>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('log','Log')">
    <i class="ti ti-barbell"></i><span>Log</span>
  </button>
  <button class="tab" onclick="switchTab('history','History')">
    <i class="ti ti-history"></i><span>History</span>
  </button>
  <button class="tab" onclick="switchTab('stats','Stats')">
    <i class="ti ti-chart-bar"></i><span>Stats</span>
  </button>
</div>

<!-- Exercise modal -->
<div class="modal-overlay" id="ex-modal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="modal-title">Add exercise</div>
      <button class="btn-ghost" onclick="closeExModal()"><i class="ti ti-x"></i></button>
    </div>
    <input class="ex-search" id="ex-search" placeholder="Search exercises..." oninput="filterExercises(this.value)" />
    <div id="ex-options"></div>
  </div>
</div>

<!-- Rest timer -->
<div class="rest-overlay" id="rest-overlay">
  <div class="rest-box">
    <div style="font-size:14px; color:var(--text2); margin-bottom:6px;">Rest timer</div>
    <div class="rest-time" id="rest-display">1:30</div>
    <div class="rest-btns">
      <button class="btn-outline" onclick="adjustRest(-15)">-15s</button>
      <button class="btn-outline" onclick="adjustRest(15)">+15s</button>
      <button class="btn-green" onclick="skipRest()">Skip</button>
    </div>
  </div>
</div>

<script>
const DB = [
  {name:'Bench press',muscle:'Chest',eq:'Barbell'},
  {name:'Squat',muscle:'Legs',eq:'Barbell'},
  {name:'Deadlift',muscle:'Back',eq:'Barbell'},
  {name:'Overhead press',muscle:'Shoulders',eq:'Barbell'},
  {name:'Barbell row',muscle:'Back',eq:'Barbell'},
  {name:'Pull-up',muscle:'Back',eq:'Bodyweight'},
  {name:'Dips',muscle:'Chest',eq:'Bodyweight'},
  {name:'Incline bench press',muscle:'Chest',eq:'Barbell'},
  {name:'Romanian deadlift',muscle:'Legs',eq:'Barbell'},
  {name:'Leg press',muscle:'Legs',eq:'Machine'},
  {name:'Leg curl',muscle:'Legs',eq:'Machine'},
  {name:'Leg extension',muscle:'Legs',eq:'Machine'},
  {name:'Cable row',muscle:'Back',eq:'Cable'},
  {name:'Lat pulldown',muscle:'Back',eq:'Cable'},
  {name:'Cable fly',muscle:'Chest',eq:'Cable'},
  {name:'Dumbbell curl',muscle:'Arms',eq:'Dumbbell'},
  {name:'Tricep pushdown',muscle:'Arms',eq:'Cable'},
  {name:'Skull crushers',muscle:'Arms',eq:'Barbell'},
  {name:'Lateral raise',muscle:'Shoulders',eq:'Dumbbell'},
  {name:'Face pull',muscle:'Shoulders',eq:'Cable'},
  {name:'Plank',muscle:'Core',eq:'Bodyweight'},
  {name:'Ab wheel rollout',muscle:'Core',eq:'Equipment'},
  {name:'Calf raise',muscle:'Legs',eq:'Machine'},
  {name:'Hip thrust',muscle:'Legs',eq:'Barbell'},
  {name:'Dumbbell shoulder press',muscle:'Shoulders',eq:'Dumbbell'},
];

let workouts = JSON.parse(localStorage.getItem('thamer_workouts') || '[]');
let activeWorkout = null;
let timerInterval = null;
let timerSecs = 0;
let restInterval = null;
let restRemaining = 0;

function save() { localStorage.setItem('thamer_workouts', JSON.stringify(workouts)); }

function switchTab(t, title) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['log','history','stats'][i] === t));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + t).classList.add('active');
  document.getElementById('page-title').textContent = title;
  if (t === 'stats') { updateStats(); renderPRs(); }
  if (t === 'history') renderHistory();
}

function startWorkout() {
  activeWorkout = { name: 'Morning session', exercises: [], startTime: Date.now() };
  timerSecs = 0;
  document.getElementById('no-workout').style.display = 'none';
  document.getElementById('active-workout').style.display = 'block';
  timerInterval = setInterval(() => {
    timerSecs++;
    const m = Math.floor(timerSecs / 60), s = timerSecs % 60;
    document.getElementById('timer').textContent = m + ':' + String(s).padStart(2,'0');
  }, 1000);
  renderExercises();
}

function cancelWorkout() {
  if (!confirm('Cancel this workout? Progress will be lost.')) return;
  clearInterval(timerInterval);
  activeWorkout = null;
  document.getElementById('no-workout').style.display = 'block';
  document.getElementById('active-workout').style.display = 'none';
}

function finishWorkout() {
  if (!activeWorkout || !activeWorkout.exercises.length) { alert('Add at least one exercise first.'); return; }
  clearInterval(timerInterval);
  const w = activeWorkout;
  w.name = document.getElementById('workout-name').value || 'Workout';
  w.duration = timerSecs;
  w.date = new Date().toISOString();
  w.exercises.forEach(ex => { ex.sets = ex.sets.filter(s => s.weight || s.reps); });
  w.exercises = w.exercises.filter(ex => ex.sets.length > 0);
  workouts.unshift(w);
  save();
  activeWorkout = null;
  document.getElementById('no-workout').style.display = 'block';
  document.getElementById('active-workout').style.display = 'none';
  updateHomeStats();
}

function addSet(ei) {
  const ex = activeWorkout.exercises[ei];
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({ weight: last ? last.weight : '', reps: last ? last.reps : '', done: false });
  renderExercises();
}

function removeSet(ei, si) {
  activeWorkout.exercises[ei].sets.splice(si, 1);
  renderExercises();
}

function toggleDone(ei, si) {
  const s = activeWorkout.exercises[ei].sets[si];
  s.done = !s.done;
  if (s.done) startRest();
  renderExercises();
}

function updateVal(ei, si, field, val) {
  activeWorkout.exercises[ei].sets[si][field] = val;
}

function removeEx(ei) {
  activeWorkout.exercises.splice(ei, 1);
  renderExercises();
}

function getPrev(name, si) {
  for (const w of workouts) {
    const ex = w.exercises.find(e => e.name === name);
    if (ex && ex.sets[si]) return ex.sets[si].weight + 'kg×' + ex.sets[si].reps;
  }
  return '—';
}

function renderExercises() {
  const c = document.getElementById('exercises-list');
  if (!activeWorkout.exercises.length) { c.innerHTML = ''; return; }
  c.innerHTML = activeWorkout.exercises.map((ex, ei) => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.muscle} · ${ex.eq}</div>
        </div>
        <button class="btn-ghost" onclick="removeEx(${ei})"><i class="ti ti-trash"></i></button>
      </div>
      <table class="set-table">
        <thead><tr><th>Set</th><th>Prev</th><th>kg</th><th>Reps</th><th></th></tr></thead>
        <tbody>${ex.sets.map((s,si) => `
          <tr>
            <td><button class="set-num ${s.done?'done':''}" onclick="toggleDone(${ei},${si})">${si+1}</button></td>
            <td style="font-size:12px;color:var(--text2);">${getPrev(ex.name,si)}</td>
            <td><input type="number" inputmode="decimal" value="${s.weight}" placeholder="0" step="0.5" onchange="updateVal(${ei},${si},'weight',this.value)" /></td>
            <td><input type="number" inputmode="numeric" value="${s.reps}" placeholder="0" onchange="updateVal(${ei},${si},'reps',this.value)" /></td>
            <td><button class="btn-ghost" style="padding:4px;" onclick="removeSet(${ei},${si})"><i class="ti ti-x" style="font-size:14px;"></i></button></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <button class="btn-ghost" style="margin-top:8px;font-size:13px;color:var(--green);" onclick="addSet(${ei})"><i class="ti ti-plus"></i> Add set</button>
    </div>
  `).join('');
}

function openExModal() {
  document.getElementById('ex-modal').classList.add('open');
  document.getElementById('ex-search').value = '';
  filterExercises('');
  setTimeout(() => document.getElementById('ex-search').focus(), 100);
}

function closeExModal() { document.getElementById('ex-modal').classList.remove('open'); }

function filterExercises(q) {
  const f = DB.filter(e => e.name.toLowerCase().includes(q.toLowerCase()) || e.muscle.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('ex-options').innerHTML = f.map(ex => `
    <div class="ex-option" onclick="addExercise('${ex.name}','${ex.muscle}','${ex.eq}')">
      <div>
        <div style="font-size:15px;font-weight:500;">${ex.name}</div>
        <div style="font-size:12px;color:var(--text2);">${ex.muscle} · ${ex.eq}</div>
      </div>
      <i class="ti ti-plus" style="color:var(--text2);font-size:18px;"></i>
    </div>
  `).join('') || '<div style="color:var(--text2);padding:12px 0;font-size:14px;">No results</div>';
}

function addExercise(name, muscle, eq) {
  activeWorkout.exercises.push({ name, muscle, eq, sets: [{ weight: '', reps: '', done: false }] });
  closeExModal();
  renderExercises();
}

function startRest(secs = 90) {
  clearInterval(restInterval);
  restRemaining = secs;
  document.getElementById('rest-overlay').classList.add('open');
  updateRestDisplay();
  restInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) { skipRest(); return; }
    updateRestDisplay();
  }, 1000);
}

function updateRestDisplay() {
  const m = Math.floor(restRemaining / 60), s = restRemaining % 60;
  document.getElementById('rest-display').textContent = m + ':' + String(s).padStart(2,'0');
}

function adjustRest(d) { restRemaining = Math.max(0, restRemaining + d); updateRestDisplay(); }
function skipRest() { clearInterval(restInterval); document.getElementById('rest-overlay').classList.remove('open'); }

function updateHomeStats() {
  const total = workouts.length;
  let totalVol = 0;
  workouts.forEach(w => w.exercises.forEach(ex => ex.sets.forEach(s => { totalVol += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0); })));
  document.getElementById('stat-workouts').textContent = total;
  document.getElementById('stat-volume').textContent = total ? Math.round(totalVol / total) : 0;
  document.getElementById('stat-streak').textContent = calcStreak();
}

function calcStreak() {
  if (!workouts.length) return 0;
  const dates = [...new Set(workouts.map(w => w.date.slice(0,10)))].sort().reverse();
  let streak = 0; let d = new Date(); d.setHours(0,0,0,0);
  for (const ds of dates) {
    const wd = new Date(ds); wd.setHours(0,0,0,0);
    if (Math.round((d - wd) / 86400000) <= 1) { streak++; d = wd; } else break;
  }
  return streak;
}

function renderHistory() {
  const c = document.getElementById('history-list');
  if (!workouts.length) {
    c.innerHTML = '<div class="empty-state"><i class="ti ti-history"></i><p>No workouts yet.<br>Start your first session!</p></div>';
    return;
  }
  c.innerHTML = workouts.map((w, i) => {
    const d = new Date(w.date);
    const dateStr = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    const dur = Math.round(w.duration / 60);
    const vol = w.exercises.reduce((a, ex) => a + ex.sets.reduce((b, s) => b + (parseFloat(s.weight)||0)*(parseInt(s.reps)||0), 0), 0);
    return `<div class="card" onclick="toggleDetail(${i})" style="cursor:pointer;">
      <div class="history-date">${dateStr}</div>
      <div class="history-title">${w.name}</div>
      <div class="history-meta">${dur} min · ${Math.round(vol)} kg · ${w.exercises.length} exercises</div>
      <div id="hd-${i}" style="display:none; margin-top:14px; padding-top:14px; border-top:0.5px solid var(--border);">
        ${w.exercises.map(ex => `
          <div class="ex-row">
            <div>
              <div style="font-size:14px;font-weight:600;">${ex.name}</div>
              <div style="font-size:12px;color:var(--text2);">${ex.sets.map(s => s.weight+'kg × '+s.reps).join(' · ')}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(i) {
  const el = document.getElementById('hd-' + i);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function updateStats() {
  let vol = 0, sets = 0;
  workouts.forEach(w => w.exercises.forEach(ex => ex.sets.forEach(s => {
    vol += (parseFloat(s.weight)||0)*(parseInt(s.reps)||0); sets++;
  })));
  document.getElementById('s-total').textContent = workouts.length;
  document.getElementById('s-vol').textContent = Math.round(vol);
  document.getElementById('s-sets').textContent = sets;
}

function renderPRs() {
  const prs = {};
  [...workouts].reverse().forEach(w => w.exercises.forEach(ex => ex.sets.forEach(s => {
    const kg = parseFloat(s.weight)||0;
    if (!prs[ex.name] || kg > prs[ex.name]) prs[ex.name] = kg;
  })));
  const entries = Object.entries(prs).filter(([,v]) => v > 0);
  const c = document.getElementById('pr-list');
  if (!entries.length) { c.innerHTML = '<div style="color:var(--text2);font-size:14px;">No records yet.</div>'; return; }
  c.innerHTML = entries.map(([name, kg]) => `
    <div class="ex-row">
      <div style="font-size:15px;font-weight:500;">${name}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="pr-badge">PR</span>
        <span style="font-size:15px;font-weight:600;">${kg} kg</span>
      </div>
    </div>`).join('');
}

updateHomeStats();
renderHistory();
</script>
</body>
</html>
